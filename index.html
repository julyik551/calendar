<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar</title>
</head>
<style>
    #container1 {
        display: flex;
        justify-content: center;
        margin-top: 30px;
        margin-bottom: 30px;
    }
    #month {
        font-size: 20px;
        font-weight: bold;
    }
    #container2 {
        display: flex;
        gap: 20px;
        justify-content: center;
    }
    .item {
        border: 1px solid black;
        padding: 10px;
        width: 100px;
        text-align: center;
    }
    .day {
        font-size: 30px;
        font-weight: bold;
    }
    .result {
        height: 100px;
        font-size: 40px;
        align-items: center;
        display: flex;
        justify-content: center;
    }
</style>
<body>
    <div id="container1">
        <div id="month"></div>
    </div>
    <div id="container2">
        <div class="item">
            <div class="day" id="day1"></div>
            <div class="result" id="result1"></div>
        </div>
        <div class="item">
            <div class="day" id="day2"></div>
            <div class="result" id="result2"></div>
        </div>
    </div>

    <script src="2026.js"></script>
    <script>

        const result1 = document.getElementById("result1");
        const result2 = document.getElementById("result2");
        const month = document.getElementById("month");
        let today = null;
        let tomorrow = null;

        const d = new Date();
        const this_day = d.getDate();
        const e = new Date();
        e.setDate(this_day + 1);
        const next_day = e.getDate();

        const this_month = d.getMonth();
        const next_month = e.getMonth();

        const array = array_2026[this_month];
        today = array[this_day - 1];

        if (this_month == next_month){
            if (this_day < array.length){
                tomorrow = array[this_day];
            }
        }
        else {
            if (next_month < array_2026.length){
                const array2 = array_2026[next_month]; // skip?
                tomorrow = array2[0];
            }
        }
        
        
        document.getElementById("day1").innerText = `${this_day}`;
        document.getElementById("day2").innerText = `${next_day}`;

        const map1 = {a: ["正常", ""], d: ["中班", ""], g: ["全日", "red"], r: ["放假", "orange"]};
        
        if (today === null){
            result1.innerText = "No data";
        }
        else {
            const info = map1[today];
            result1.innerText = `${info[0]}`;
            result1.style.color = info[1] === "" ? "black" : info[1];
        }

        if (tomorrow === null){
            result2.innerText = "No data";
        }
        else {
            const info = map1[tomorrow];
            result2.innerText = `${info[0]}`;
            result2.style.color = info[1] === "" ? "black" : info[1];
        }

        const months = ["一", "二", "三", "四", "五", "六", "七", "八", "九", "十", "十一", "十二"];
        if (this_month === next_month){
            month.innerText = `${months[this_month]}月`;
        } else {
            month.innerText = `${months[this_month]}月 / ${months[next_month]}月`;
        }
        
    </script>
</body>
</html>
