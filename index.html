<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar</title>
</head>
<style>
    #container1 {
        display: flex;
        justify-content: center;
        margin-top: 30px;
        margin-bottom: 30px;
    }
    #month {
        font-size: 40px;
        font-weight: bold;
    }
    #container2 {
        display: flex;
        gap: 20px;
        justify-content: center;
    }
    .item {
        border: 1px solid black;
        padding: 10px;
        width: 100px;
        text-align: center;
        font-size: 30px;
    }
    .day {
        font-weight: bold;
    }
    .result {
        height: 100px;
        font-size: 50px;
        align-items: center;
        display: flex;
        justify-content: center;
    }
</style>
<body>
    <div id="container1">
        <div id="month"></div>
    </div>
    <div id="container2">
        <div class="item">
            <div class="day" id="day1"></div>
            <div class="result" id="result1"></div>
        </div>
        <div class="item">
            <div class="day" id="day2"></div>
            <div class="result" id="result2"></div>
        </div>
    </div>

    <script src="2026.js"></script>
    <script>

        const result1 = document.getElementById("result1");
        const result2 = document.getElementById("result2");
        const month = document.getElementById("month");
        const result = [null, null];

        const d = new Date();
        const this_month = d.getMonth();
        const array = array_2026[this_month];
        let array2 = null;
        if (this_month + 1 < array_2026.length){
            array2 = array_2026[this_month + 1];
        }

        const this_day = d.getDate();
        result[0] = array[this_day - 1];
        if (this_day < array.length){
            result[1] = array[this_day];
        } else if (array2 !== null){
            result[1] = array2[0];
        }
        
        document.getElementById("day1").innerText = `${this_day}`;
        document.getElementById("day2").innerText = `${this_day + 1}`; //check next month

        if (result[0] === null){
            result1.innerText = "No data";
        }
        else {
            result1.innerText = `${result[0].toUpperCase()}`;
        }

        if (result[1] === null){
            result2.innerText = "No data";
        }
        else {
            result2.innerText = `${result[1].toUpperCase()}`;
        }

        month.innerText = `${this_month + 1}月`;
        
    </script>
</body>

</html>
